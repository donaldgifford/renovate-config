name: Validate
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-presets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install renovate
        run: npm install -g renovate

      - name: Validate all Renovate presets
        run: |
          status=0
          for f in *.json5; do
            echo "::group::Validating $f"
            if ! renovate-config-validator --strict "$f"; then
              echo "::error file=$f::Validation failed for $f"
              status=1
            fi
            echo "::endgroup::"
          done
          exit $status

      - name: Check JSON5 formatting
        run: npx prettier --check "*.json5"
